name: Build MSST Docker Image

on:
  push:
    branches:
    - main
    - develop
    - cicd/*

env:
  # Define image name variables - Adjust USERNAME/REPO as needed
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # Format: USERNAME/REPO_NAME
  # --- AWS ECR Configuration ---
  AWS_REGION: ${{ secrets.AWS_REGION }}
  # TODO: Add AWS_ACCOUNT_ID as a GitHub Secret or replace the placeholder below
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  # Define ECR repository name (defaults to GitHub repo name)
  ECR_REPOSITORY_NAME: ${{ github.event.repository.name }}
  # Construct ECR registry URL
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com # Adjust region if needed

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # Needed to check out the repo
      packages: write     # Needed to push images to GHCR
      id-token: write     # Needed for AWS OIDC authentication (if used instead of keys)

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # Ensure submodule code is available for the build context

    - name: Free Up Disk Space on Runner
      run: |
        echo "Initial disk space:"
        df -h
        echo "Removing .NET SDKs..."
        sudo rm -rf /usr/share/dotnet
        echo "Removing Haskell (ghc)..."
        sudo rm -rf /opt/ghc
        echo "Removing Boost libraries..."
        sudo rm -rf "/usr/local/share/boost"
        echo "Removing Android NDK, SDK, and platform-tools..." # big
        sudo rm -rf /usr/local/lib/android
        echo "Removing CodeQL bundles..."
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        echo "Removing pre-installed tool cache ($AGENT_TOOLSDIRECTORY)..." # big
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        echo "Cleaning apt caches..."
        sudo apt-get clean -y
        echo "Disk space after cleanup:"
        df -h
      shell: bash

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} # Required secret
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # Required secret
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.ECR_REGISTRY }}
        # Username and password are provided by the AWS credentials configuration step

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # Use the built-in GITHUB_TOKEN

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_NAME }}
        # Example tagging strategy:
        # - 'latest' for the default branch (e.g., main)
        # - Git ref (branch name, tag name)
        # - Git sha
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix=sha-
          type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}


    - name: Build and push Docker image to GHCR and ECR
      id: build-and-push
      uses: docker/build-push-action@v5
      with:
        context: . # Use the root of the repo as the build context
        file: ./Dockerfile # Explicitly point to your Dockerfile
        push: true # Push the image to the registries
        tags: ${{ steps.meta.outputs.tags }} # Use tags generated by metadata-action for both registries
        labels: ${{ steps.meta.outputs.labels }} # Use labels generated by metadata-action
        cache-from: type=gha # Enable pulling cache from GHA
        cache-to: type=gha,mode=max # Enable pushing cache to GHA (mode=max for better caching)

    - name: Get current disk usage after build
      run: df -h



    # Optional: You might add a step here to trigger a deployment
    # or notify that a new image is available.
    # The 'Test run the code' step from the old workflow is removed,
    # as the primary artifact is now the container image itself.
    # Testing would typically happen after deployment or by running the container.
