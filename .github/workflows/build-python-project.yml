name: Install Dependencies with CUDA PyTorch

on:
  push:
    branches: 
    - main
    - develop
    - cicd/*

jobs:
  install:
    runs-on: ubuntu-latest # Use standard GitHub runners

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # Important: Fetches the submodule(s)

    - name: Set up Python
      id: setup-python # Give the step an ID to reference its outputs
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Choose your desired Python version

    - name: Get pip cache dir
      id: pip-cache # Give the step an ID
      run: echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.pip-cache.outputs.dir }} # Use the dynamic cache path
        key: ${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/requirements.txt') }}-${{ hashFiles('.github/workflows/build-python-project.yml') }} # Key includes OS, Python version, requirements files, and the workflow file itself (to bust cache if install commands change)
        restore-keys: |
          ${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y portaudio19-dev

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install PyTorch for CUDA 12.6
      run: |
        pip install \
          --extra-index-url https://download.pytorch.org/whl/cu126 \
          torch torchvision torchaudio

    - name: Filter submodule requirements to exclude wxpython
      run: grep -v '^wxpython==' Music-Source-Separation-Training/requirements.txt > filtered_submodule_reqs.txt

    - name: Install dependencies from requirements files
      # This step will also use the cache if available.
      # Assumes main repo has requirements.txt and submodule is in Music-Source-Separation-Training/
      # Adjust paths if necessary.
      # Install main requirements and filtered submodule requirements
      run: |
        pip install \
          -r requirements.txt \
          -r filtered_submodule_reqs.txt # Use the filtered file

    - name: Download model files
      run: |
        # bs_roformer | Vocals BS-Roformer_1296 (by viperx)
        mkdir -p ./models
        curl -L -o ./models/model_bs_roformer_ep_368_sdr_12.9628.yaml https://raw.githubusercontent.com/TRvlvr/application_data/main/mdx_model_data/mdx_c_configs/model_bs_roformer_ep_368_sdr_12.9628.yaml
        curl -L -o ./models/model_bs_roformer_ep_368_sdr_12.9628.ckpt https://github.com/TRvlvr/model_repo/releases/download/all_public_uvr_models/model_bs_roformer_ep_368_sdr_12.9628.ckpt

    - name: Test run the code
      run: |
        cd Music-Source-Separation-Training/
        python inference.py \
            --model_type bs_roformer \
            --config_path ../models/model_bs_roformer_ep_368_sdr_12.9628.yaml \
            --start_check_point ../models/model_bs_roformer_ep_368_sdr_12.9628.ckpt \
            --input_folder ../input-sounds/ \
            --store_dir ../output-sounds/
        ls -lah ../output-sounds/