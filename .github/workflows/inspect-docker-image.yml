name: Inspect Docker Image Layers

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: 'Image reference (branch name, tag, or SHA)'
        required: true
        type: string
        default: 'latest'
  # push:
  #   branches:
  #     - main
  #     - develop
  #     - cicd/*

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  EXAMPLE_REF: 'cicd-add-GHA' # Example branch hardcoded for push events

jobs:
  inspect-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read  # Needed to pull images from GHCR
    
    steps:
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Determine image tag
      id: image-tag
      run: |
        # For push events, use the example ref
        # For workflow_dispatch, use the input
        if [[ "${{ github.event_name }}" == "push" ]]; then
          REF="${{ env.EXAMPLE_REF }}"
        else
          REF=${{ github.event.inputs.image_ref }}
        fi
        
        if [[ $REF == sha-* ]]; then
          # It's already in the correct format
          IMAGE_TAG=$REF
        elif [[ $REF == refs/heads/* ]]; then
          # Extract branch name from refs/heads/
          BRANCH=${REF#refs/heads/}
          IMAGE_TAG=$BRANCH
        else
          # Use as is (might be a branch name or tag)
          IMAGE_TAG=$REF
        fi
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
        
    - name: Pull Docker image
      run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
    
    - name: Display image details
      run: |
        echo "## Full image information" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        docker image ls ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        
        
        echo "## Layer details with commands and sizes" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "COMMAND | SIZE" >> $GITHUB_STEP_SUMMARY
        echo "--- | ---" >> $GITHUB_STEP_SUMMARY
        
        # Process the output to make long commands wrap better in markdown table
        docker history --no-trunc --format "{{.CreatedBy}}|{{.Size}}" \
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} | \
        awk -F'|' '{
          cmd = $1;
          size = $2;
          # Replace spaces with non-breaking spaces in the command
          gsub(/ /, " ", cmd);
          # Insert line breaks for long commands (at pipe character)
          gsub(/\|/, " \\\n| ", cmd);
          # Print the formatted result
          print cmd " | " size
        }' >> $GITHUB_STEP_SUMMARY
        
        echo "## Detailed layer history" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        docker history --human --no-trunc ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY 