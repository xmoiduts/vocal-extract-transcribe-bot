name: Deploy Telegram Bot Lambda

on:
  push:
    branches:
      - main
      - develop
      - cicd/*
      - feature/*
    paths:
      - 'bot-src/**'
      - '.github/workflows/deploy-lambda.yml'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  deploy-lambda:
    runs-on: ubuntu-latest
    # Optional: if you use GitHub environments for secrets that are specific to this deployment
    # environment: production 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Make sure this matches your AWS Lambda runtime Python version

      - name: Install dependencies and create ZIP package
        run: |
          python -m pip install --upgrade pip
          mkdir ./deployment_package # Create a specific directory for packaging
          
          echo "Copying Python source files to deployment_package..."
          # 复制所有Python文件
          cp bot-src/* ./deployment_package/
          
          
          # 创建__init__.py使其成为Python包
          #touch ./deployment_package/__init__.py
          
          echo "Copied Python files:"
          ls -la ./deployment_package/*.py
          
          # Do not install dependencies from other requirements.txt
          if [ -f bot-src/requirements.txt ]; then
            echo "Installing dependencies from bot-src/requirements.txt into deployment_package..."
            pip install -r bot-src/requirements.txt --target ./deployment_package
          else
            echo "bot-src/requirements.txt not found, skipping dependency installation for Lambda."
          fi
          
          echo "Creating lambda_function.zip from deployment_package contents..."
          cd ./deployment_package
          zip -r ../lambda_function.zip .
          cd .. 
          echo "Created lambda_function.zip in project root."
          
          # 验证包内容
          echo "Package contents:"
          unzip -l lambda_function.zip | grep "\.py$"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} # Specific for Lambda deployment
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # Specific for Lambda deployment
          aws-region: ${{ secrets.AWS_REGION }} # e.g., us-east-1, ap-southeast-1

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda_function.zip \
            --publish # Optional: to publish a new version
          echo "Lambda function deployed successfully!"

      - name: Update Telegram Bot Commands
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "Updating bot commands on Telegram..."
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          # Use jq to read commands.json, format it for the API, and add the dynamic timestamp command
          JSON_PAYLOAD=$(jq --arg ts "Last updated: $TIMESTAMP" \
            '{commands: ([to_entries[] | {command: .key, description: .value}] + [{"command": "updated_at", "description": $ts}])}' \
            bot-src/commands.json)
          
          echo "Generated Payload:"
          echo $JSON_PAYLOAD
          
          # Send the command list to the Telegram Bot API
          API_URL="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setMyCommands"
          HTTP_RESPONSE=$(curl -s -w "%{http_code}" -X POST -H "Content-Type: application/json" --data "$JSON_PAYLOAD" "$API_URL")
          HTTP_STATUS=$(echo $HTTP_RESPONSE | sed 's/.*\([0-9]\{3\}\)$/\1/')
          HTTP_BODY=$(echo $HTTP_RESPONSE | sed 's/[0-9]\{3\}$//')

          echo "Telegram API response body: $HTTP_BODY"
          echo "Telegram API response status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Bot commands updated successfully!"
          else
            echo "🔴 Failed to update bot commands."
            exit 1
          fi
