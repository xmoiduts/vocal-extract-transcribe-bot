name: Deploy Telegram Bot Lambda

on:
  push:
    branches:
      - main
      - develop
      - cicd/*
      - feature/*
    paths:
      - 'bot-src/**'
      - '.github/workflows/deploy-lambda.yml'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  deploy-lambda:
    runs-on: ubuntu-latest
    # Optional: if you use GitHub environments for secrets that are specific to this deployment
    # environment: production 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Make sure this matches your AWS Lambda runtime Python version

      - name: Install dependencies and create ZIP package
        run: |
          python -m pip install --upgrade pip
          mkdir ./deployment_package # Create a specific directory for packaging
          echo "Copying lambda_function.py to deployment_package..."
          cp bot-src/lambda_function.py ./deployment_package/
          
          # Do not install dependencies from other requirements.txt
          if [ -f bot-src/requirements.txt ]; then
            echo "Installing dependencies from bot-src/requirements.txt into deployment_package..."
            pip install -r bot-src/requirements.txt --target ./deployment_package
          else
            echo "bot-src/requirements.txt not found, skipping dependency installation for Lambda."
          fi
          
          echo "Creating lambda_function.zip from deployment_package contents..."
          cd ./deployment_package
          zip -r ../lambda_function.zip .
          cd .. 
          echo "Created lambda_function.zip in project root."

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} # Specific for Lambda deployment
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # Specific for Lambda deployment
          aws-region: ${{ secrets.AWS_REGION }} # e.g., us-east-1, ap-southeast-1

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda_function.zip \
            --publish # Optional: to publish a new version
          echo "Lambda function deployed successfully!"
